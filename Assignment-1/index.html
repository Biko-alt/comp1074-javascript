<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>See 'N' Say Storyteller</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/normalize.css">
</head>
<body>
    <div class="container">
        <h1>See 'N' Say Storyteller</h1>
        <p>Click on the buttons below to hear the sounds of the animals and the story.</p>
        
        <div class="story controls">
            <button id="part1">The turkey</button>
            <button id="part2">sat on</button>
            <button id="part3">a funny</button>
            <button id="part4">monkey</button>
            <button id="part5">on the moon</button>
        </div>

        <div class="buttons">
            <button id="showStory">Tell Story</button>
            <button id="randomStory">Random Story</button>
            <button id="reset">Reset</button>
        </div>

        <div id="output"></div>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
